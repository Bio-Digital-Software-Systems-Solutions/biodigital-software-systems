name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop, staging ]

jobs:
  # Job 1: Code Quality & Static Analysis
  code-quality:
    name: Code Quality & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, bcmath, gd, pdo, mysql
          coverage: none
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPStan (Static Analysis)
        run: make phpstan

      - name: Run PHP_CodeSniffer (PSR-12 Compliance)
        run: make phpcs

      - name: Run PHPMD (Mess Detector)
        run: make phpmd

      - name: Run Laravel Pint (Code Style Check)
        run: make pint

  # Job 2: Backend Tests
  backend-tests:
    name: Backend Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: test_database
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, json, bcmath, gd, pdo, mysql
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Copy .env.testing
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing

      - name: Configure environment for testing
        run: |
          echo "DB_CONNECTION=mysql" >> .env.testing
          echo "DB_HOST=127.0.0.1" >> .env.testing
          echo "DB_PORT=3306" >> .env.testing
          echo "DB_DATABASE=test_database" >> .env.testing
          echo "DB_USERNAME=root" >> .env.testing
          echo "DB_PASSWORD=password" >> .env.testing
          echo "APP_ENV=testing" >> .env.testing

      - name: Run Migrations
        run: php artisan migrate --env=testing --force

      - name: Run Pest Tests
        run: make pest

      - name: Run PHPUnit Tests (Legacy)
        run: make test

      - name: Generate Coverage Report
        if: matrix.php == '8.2'
        run: vendor/bin/pest --coverage --coverage-clover coverage.xml

      - name: Upload Coverage to Artifacts
        if: matrix.php == '8.2'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # Job 3: Frontend Tests & Build
  frontend-tests:
    name: Frontend Tests & Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run TypeScript compilation
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Run Jest tests
        run: npm run test

      - name: Build frontend assets
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/build

  # Job 4: Security Checks
  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check for security vulnerabilities (PHP)
        run: composer audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Check for security vulnerabilities (npm)
        run: npm audit --audit-level=moderate

  # Job 5: Full Quality Check (Makefile)
  full-quality-check:
    name: Full Quality Check
    runs-on: ubuntu-latest
    needs: [code-quality, backend-tests, frontend-tests, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, bcmath, gd, pdo, mysql
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Configure MySQL for testing
        run: |
          sudo systemctl start mysql.service
          mysql -u root -proot -e "CREATE DATABASE IF NOT EXISTS test_database;"
          mysql -u root -proot -e "ALTER USER 'root'@'localhost' IDENTIFIED BY 'password';"

      - name: Copy .env.testing
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing
          echo "DB_CONNECTION=mysql" >> .env.testing
          echo "DB_HOST=127.0.0.1" >> .env.testing
          echo "DB_PORT=3306" >> .env.testing
          echo "DB_DATABASE=test_database" >> .env.testing
          echo "DB_USERNAME=root" >> .env.testing
          echo "DB_PASSWORD=password" >> .env.testing

      - name: Run Migrations
        run: php artisan migrate --env=testing --force

      - name: Run Full Quality Check (make quality)
        run: make quality

      - name: Summary
        if: always()
        run: |
          echo "### CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Code Quality: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Tests: ${{ needs.backend-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Tests: ${{ needs.frontend-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Checks: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Full Quality Check: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** Robot Framework tests run in a separate workflow. See 'Robot Framework Tests' workflow for E2E/API/UI test results." >> $GITHUB_STEP_SUMMARY

  # Job 6: Robot Framework API Tests (Quick)
  robot-api-tests:
    name: Robot Framework API Tests
    runs-on: ubuntu-latest
    needs: [backend-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: icc_munich
          MYSQL_USER: icc_user
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, json, bcmath, gd, pdo, mysql
          coverage: none
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          composer install --prefer-dist --no-progress --no-interaction
          npm ci
          npm run build

      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=icc_munich" >> .env
          echo "DB_USERNAME=icc_user" >> .env
          echo "DB_PASSWORD=secret" >> .env
          php artisan migrate --force
          php artisan db:seed --force

      - name: Start Laravel server
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 &
          sleep 5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Robot Framework
        run: |
          pip install robotframework robotframework-requests robotframework-jsonlibrary
          pip install robotframework-databaselibrary PyMySQL

      - name: Run API Tests
        run: |
          mkdir -p robot-results
          robot \
            --outputdir robot-results \
            --loglevel INFO \
            --include api \
            --include smoke \
            --variable BASE_URL:http://127.0.0.1:8000 \
            --variable API_URL:http://127.0.0.1:8000/api \
            --variable DB_HOST:127.0.0.1 \
            --variable DB_PORT:3306 \
            --variable DB_NAME:icc_munich \
            --variable DB_USER:icc_user \
            --variable DB_PASSWORD:secret \
            robot-tests/api/ || true

      - name: Upload Robot Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-api-results
          path: robot-results/
          retention-days: 14
