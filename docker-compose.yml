services:
  # ==========================================
  # PHP-FPM Application
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: icc-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php-dev.ini:/usr/local/etc/php/conf.d/99-custom.ini
      - ./docker/php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
      - php-logs:/var/log/php
    environment:
      - PHP_IDE_CONFIG=serverName=icc-munich
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=icc_munich
      - DB_USERNAME=icc_user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - icc-network

  # ==========================================
  # Nginx Web Server
  # ==========================================
  nginx:
    image: nginx:1.25-alpine
    container_name: icc-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
      - "443:443"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - icc-network

  # ==========================================
  # MySQL Database
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: icc-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: ${DB_DATABASE:-icc_munich}
      MYSQL_USER: icc_user
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - icc-network

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: icc-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - icc-network

  # ==========================================
  # Node.js for Vite Dev Server
  # ==========================================
  node:
    image: node:20-alpine
    container_name: icc-node
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - node-modules:/var/www/html/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    networks:
      - icc-network

  # ==========================================
  # Laravel Queue Worker
  # ==========================================
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: icc-queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - php-logs:/var/log/php
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=icc_munich
      - DB_USERNAME=icc_user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - icc-network

  # ==========================================
  # Laravel Scheduler (Cron)
  # ==========================================
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: icc-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - php-logs:/var/log/php
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=icc_munich
      - DB_USERNAME=icc_user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - icc-network

  # ==========================================
  # Mailhog (Development Email Testing)
  # ==========================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: icc-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - icc-network

  # ==========================================
  # phpMyAdmin (Database Management)
  # ==========================================
  phpmyadmin:
    image: phpmyadmin:5
    container_name: icc-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: secret
      UPLOAD_LIMIT: 100M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - icc-network

# ==========================================
# Volumes
# ==========================================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  node-modules:
    driver: local
  php-logs:
    driver: local
  nginx-logs:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  icc-network:
    driver: bridge
