services:
  # ==========================================
  # PHP-FPM Application
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: template-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php-dev.ini:/usr/local/etc/php/conf.d/99-custom.ini
      - ./docker/php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
      - php-logs:/var/log/php
    environment:
      - PHP_IDE_CONFIG=serverName=icc-munich
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=icc_munich
      - DB_USERNAME=icc_user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - template-network

  # ==========================================
  # Nginx Web Server
  # ==========================================
  nginx:
    image: nginx:1.25-alpine
    container_name: template-nginx
    restart: unless-stopped
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.template-app.rule=Host(`template.localhost`)
      - traefik.http.routers.template-app.entrypoints=web
      - traefik.http.services.template-app.loadbalancer.server.port=80
    depends_on:
      - app
    networks:
      - template-network
      - traefik-public

  # ==========================================
  # MySQL Database
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: template-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: ${DB_DATABASE:-icc_munich}
      MYSQL_USER: icc_user
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - template-network

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: template-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - template-network

  # ==========================================
  # Node.js for Vite Dev Server
  # ==========================================
  node:
    image: node:20-alpine
    container_name: template-node
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - node-modules:/var/www/html/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.template-vite.rule=Host(`vite.template.localhost`)
      - traefik.http.routers.template-vite.entrypoints=web
      - traefik.http.services.template-vite.loadbalancer.server.port=5173
    networks:
      - template-network
      - traefik-public

  # ==========================================
  # Laravel Queue Worker
  # ==========================================
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: template-queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - php-logs:/var/log/php
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=icc_munich
      - DB_USERNAME=icc_user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - template-network

  # ==========================================
  # Laravel Scheduler (Cron)
  # ==========================================
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: template-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - php-logs:/var/log/php
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=icc_munich
      - DB_USERNAME=icc_user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - template-network

  # ==========================================
  # Mailhog (Development Email Testing)
  # ==========================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: template-mailhog
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.template-mail.rule=Host(`mail.template.localhost`)
      - traefik.http.routers.template-mail.entrypoints=web
      - traefik.http.services.template-mail.loadbalancer.server.port=8025
    networks:
      - template-network
      - traefik-public

  # ==========================================
  # phpMyAdmin (Database Management)
  # ==========================================
  phpmyadmin:
    image: phpmyadmin:5
    container_name: template-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: secret
      UPLOAD_LIMIT: 100M
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.template-pma.rule=Host(`pma.template.localhost`)
      - traefik.http.routers.template-pma.entrypoints=web
      - traefik.http.services.template-pma.loadbalancer.server.port=80
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - template-network
      - traefik-public

  # ==========================================
  # Robot Framework Test Automation
  # ==========================================
  robot:
    build:
      context: .
      dockerfile: docker/robot/Dockerfile
    container_name: template-robot
    working_dir: /robot
    volumes:
      - ./robot-tests:/robot/tests
      - ./robot-results:/robot/results
    environment:
      - BASE_URL=http://nginx
      - API_URL=http://nginx/api
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=icc_munich
      - DB_USER=icc_user
      - DB_PASSWORD=secret
      - BROWSER=chromium
      - HEADLESS=true
    depends_on:
      nginx:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - template-network
    profiles:
      - testing

# ==========================================
# Volumes
# ==========================================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  node-modules:
    driver: local
  php-logs:
    driver: local
  nginx-logs:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  template-network:
    driver: bridge
  traefik-public:
    external: true
