services:
  # ==========================================
  # PHP-FPM Application
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: bio-digital-software-systems-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      # vendor/ lives in a named volume on the VM's native fs instead of the
      # slow sshfs bind mount. The autoloader reads thousands of files per
      # request — this is the main cause of slow page loads in local dev.
      - vendor:/var/www/html/vendor
      - ./docker/php/php-dev.ini:/usr/local/etc/php/conf.d/99-custom.ini
      - ./docker/php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
      - php-logs:/var/log/php
    # Seed the vendor volume on first start (empty volume), then run php-fpm.
    # When deps change, reinstall with: docker compose exec app composer install
    command: sh -c "[ -f vendor/autoload.php ] || composer install --no-interaction --prefer-dist; exec php-fpm"
    environment:
      # Xdebug off by default for performance. Flip on when needed:
      # XDEBUG_MODE=debug docker compose up -d app   (or =coverage for test coverage)
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
      - PHP_IDE_CONFIG=serverName=icc-munich
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=bio_digital_software_systems
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bio-digital-software-systems-network

  # ==========================================
  # Nginx Web Server
  # ==========================================
  nginx:
    image: nginx:1.25-alpine
    container_name: bio-digital-software-systems-nginx
    restart: unless-stopped
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.bio-digital-software-systems-app.rule=Host(`bio-digital-software-systems.localhost`)
      - traefik.http.routers.bio-digital-software-systems-app.entrypoints=web
      - traefik.http.services.bio-digital-software-systems-app.loadbalancer.server.port=80
    depends_on:
      - app
    networks:
      - bio-digital-software-systems-network
      - traefik-public

  # ==========================================
  # MySQL Database
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: bio-digital-software-systems-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: ${DB_DATABASE:-bio_digital_software_systems}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bio-digital-software-systems-network

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: bio-digital-software-systems-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bio-digital-software-systems-network

  # ==========================================
  # Node.js for Vite Dev Server
  # ==========================================
  node:
    image: node:20-alpine
    container_name: bio-digital-software-systems-node
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - node-modules:/var/www/html/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.bio-digital-software-systems-vite.rule=Host(`vite.bio-digital-software-systems.localhost`)
      - traefik.http.routers.bio-digital-software-systems-vite.entrypoints=web
      - traefik.http.services.bio-digital-software-systems-vite.loadbalancer.server.port=5173
    networks:
      - bio-digital-software-systems-network
      - traefik-public

  # ==========================================
  # Laravel Queue Worker
  # ==========================================
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: bio-digital-software-systems-queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - php-logs:/var/log/php
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=bio_digital_software_systems
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
    # Wait for the app service to seed the shared vendor volume before starting.
    command: sh -c "until [ -f vendor/autoload.php ]; do echo 'Waiting for vendor...'; sleep 2; done; exec php artisan queue:work --sleep=3 --tries=3 --max-time=3600"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bio-digital-software-systems-network

  # ==========================================
  # Laravel Scheduler (Cron)
  # ==========================================
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: bio-digital-software-systems-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - php-logs:/var/log/php
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=bio_digital_software_systems
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
    # Wait for the app service to seed the shared vendor volume before starting.
    command: sh -c "until [ -f vendor/autoload.php ]; do echo 'Waiting for vendor...'; sleep 2; done; while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bio-digital-software-systems-network

  # ==========================================
  # Mailhog (Development Email Testing)
  # ==========================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: bio-digital-software-systems-mailhog
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.bio-digital-software-systems-mail.rule=Host(`mail.bio-digital-software-systems.localhost`)
      - traefik.http.routers.bio-digital-software-systems-mail.entrypoints=web
      - traefik.http.services.bio-digital-software-systems-mail.loadbalancer.server.port=8025
    networks:
      - bio-digital-software-systems-network
      - traefik-public

  # ==========================================
  # phpMyAdmin (Database Management)
  # ==========================================
  phpmyadmin:
    image: phpmyadmin:5
    container_name: bio-digital-software-systems-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: secret
      UPLOAD_LIMIT: 100M
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.bio-digital-software-systems-pma.rule=Host(`pma.bio-digital-software-systems.localhost`)
      - traefik.http.routers.bio-digital-software-systems-pma.entrypoints=web
      - traefik.http.services.bio-digital-software-systems-pma.loadbalancer.server.port=80
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bio-digital-software-systems-network
      - traefik-public

  # ==========================================
  # Robot Framework Test Automation
  # ==========================================
  robot:
    build:
      context: .
      dockerfile: docker/robot/Dockerfile
    container_name: bio-digital-software-systems-robot
    working_dir: /robot
    volumes:
      - ./robot-tests:/robot/tests
      - ./robot-results:/robot/results
    environment:
      - BASE_URL=http://nginx
      - API_URL=http://nginx/api
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=bio_digital_software_systems
      - DB_USER=root
      - DB_PASSWORD=secret
      - BROWSER=chromium
      - HEADLESS=true
    depends_on:
      nginx:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - bio-digital-software-systems-network
    profiles:
      - testing

# ==========================================
# Volumes
# ==========================================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  node-modules:
    driver: local
  vendor:
    driver: local
  php-logs:
    driver: local
  nginx-logs:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  bio-digital-software-systems-network:
    driver: bridge
  traefik-public:
    external: true
