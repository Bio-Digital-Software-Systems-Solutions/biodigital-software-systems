# Jenkins CI/CD Docker Compose Configuration
# Usage: docker compose -f docker-compose.jenkins.yml up -d

services:
  # ==========================================
  # Jenkins CI/CD Server (Custom Build)
  # ==========================================
  jenkins:
    build:
      context: ./docker/jenkins
      dockerfile: Dockerfile
    container_name: icc-jenkins
    restart: unless-stopped
    privileged: true
    user: root
    ports:
      - "8081:8080"     # Jenkins Web UI
      - "50000:50000"   # Jenkins agent port
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker
      - ./:/var/jenkins_home/workspace/icc-munich  # Project source
      - ./docker/jenkins/jobs:/var/jenkins_home/jobs-config  # Job configurations
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Xmx2g
      - JENKINS_OPTS=--prefix=/
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc.yaml
      - JENKINS_ADMIN_PASSWORD=admin123
    networks:
      - jenkins-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # ==========================================
  # Docker-in-Docker for Jenkins builds
  # ==========================================
  docker-dind:
    image: docker:dind
    container_name: icc-jenkins-dind
    restart: unless-stopped
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=/certs
    volumes:
      - jenkins-docker-certs:/certs/client
      - jenkins-data:/var/jenkins_home
    networks:
      - jenkins-network

  # ==========================================
  # SonarQube Code Quality (Optional)
  # ==========================================
  sonarqube:
    image: sonarqube:lts-community
    container_name: icc-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-extensions:/opt/sonarqube/extensions
    networks:
      - jenkins-network
    profiles:
      - sonar

# ==========================================
# Volumes
# ==========================================
volumes:
  jenkins-data:
    driver: local
  jenkins-docker-certs:
    driver: local
  sonarqube-data:
    driver: local
  sonarqube-logs:
    driver: local
  sonarqube-extensions:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  jenkins-network:
    driver: bridge
