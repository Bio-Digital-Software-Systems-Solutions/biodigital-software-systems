; Xdebug Configuration for Development

[xdebug]
; Off by default for local performance. Enable on demand via the XDEBUG_MODE
; env var (e.g. XDEBUG_MODE=debug to step-debug, XDEBUG_MODE=coverage for test
; coverage runs). The "coverage"/"develop" modes add heavy per-request overhead.
xdebug.mode = off
xdebug.start_with_request = trigger
xdebug.discover_client_host = true
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.log = /var/log/php/xdebug.log
xdebug.idekey = VSCODE
