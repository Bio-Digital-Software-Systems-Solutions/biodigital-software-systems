; PHP Configuration for Development

[PHP]
; Memory
memory_limit = 512M

; Upload
upload_max_filesize = 100M
post_max_size = 100M
max_file_uploads = 20

; Execution
max_execution_time = 300
max_input_time = 300
default_socket_timeout = 60

; Error handling
display_errors = On
display_startup_errors = On
log_errors = On
error_log = /var/log/php/error.log
error_reporting = E_ALL

; Date
date.timezone = Europe/Berlin

; Session
session.cookie_httponly = On
session.cookie_secure = Off
session.use_strict_mode = On

; Security (relaxed for dev)
expose_php = On
allow_url_fopen = On
allow_url_include = Off

; Performance
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; OPcache (dev) — capacite augmentee pour Laravel + vendor.
; Le bind-mount est en sshfs (lent) : validate_timestamps=0 evite un stat()
; par fichier a chaque requete (c'etait la cause des ~44s/requete).
; COMPROMIS : apres une modif de code PHP, recharger php-fpm :
;   docker compose restart app   (ou: docker compose exec app kill -USR2 1)
[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 30000
opcache.validate_timestamps = 0
opcache.save_comments = 1
